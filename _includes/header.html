<header class="site-header">
  <div class="container site-header__inner">
    <a class="site-logo" href="{{ '/index.html' | relative_url }}" aria-label="Wild Animal — home">
      <picture>
        <source type="image/webp"
                srcset="{{ '/assets/images/wordmark-home-400.webp' | relative_url }} 400w, {{ '/assets/images/wordmark-home-800.webp' | relative_url }} 800w, {{ '/assets/images/wordmark-home-1312.webp' | relative_url }} 1312w"
                sizes="(max-width: 768px) 86px, 110px">
        <img src="{{ '/assets/images/wordmark-home-1312.png' | relative_url }}" alt="Wild Animal" width="1312" height="669">
      </picture>
    </a>

    <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="primary-nav" aria-label="Toggle navigation">
      <span class="nav-toggle__bars" aria-hidden="true"></span>
    </button>

    <nav class="site-nav" id="primary-nav" aria-label="Primary">
      <ul class="site-nav__list">
        {%- for item in site.data.nav %}
        <li><a class="site-nav__link" href="{{ item.href | relative_url }}"{% if page.nav_active == item.key %} aria-current="page"{% endif %}>{{ item.label }}</a></li>
        {%- endfor %}
      </ul>
    </nav>
  </div>
</header>
